<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إشراق | تصميم احترافي</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#09090B;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            text-align:center;
        }

        h1{
            font-size:42px;
            margin-bottom:15px;
        }

        p{
            color:#b8b8b8;
            font-size:18px;
            margin-bottom:30px;
        }

        .btn{
            background:#D4AF37;
            color:black;
            padding:15px 35px;
            border-radius:40px;
            text-decoration:none;
            font-weight:bold;
            transition:.3s;
        }

        .btn:hover{
            transform:scale(1.05);
        }
    </style>

</head>

<body>

<div>

<h1>إشراق</h1>

<p>
نحوّل أفكارك إلى تصاميم تترك أثرًا
</p>

<a class="btn" href="#">
اطلب تصميمك الآن
</a>

</div>

</body>
</html>
